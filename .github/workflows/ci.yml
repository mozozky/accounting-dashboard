name: CI

# Automatic safety-checks. Runs on every pull request (and on pushes to master)
# so a change that breaks the build or has obvious code errors is caught
# automatically before it goes live.
on:
  pull_request:
  push:
    branches: [master]

jobs:
  checks:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (check for obvious mistakes)
        run: npm run lint

      - name: Build (make sure the app still compiles)
        run: npm run build
        env:
          # Dummy values: the app reads Supabase config at request time, not at
          # build time, so the build never connects anywhere. These just satisfy
          # the type-level checks. No real secrets are needed for CI.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key-for-ci
          SUPABASE_SERVICE_ROLE_KEY: dummy-service-role-key-for-ci
          SIGNUP_CODE: ""
